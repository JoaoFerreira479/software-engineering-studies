<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Layout de exemplo usando CSS Grid - Cafezinho.">
    <title>Layout Grid - Cafezinho</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header" role="banner">
        <div class="top-bar">
            <div class="logo">Logotipo</div>
            <label for="busca-grid" class="visually-hidden">Pesquisar</label>
            <input type="search" id="busca-grid" class="search-bar" placeholder="Pesquise aqui..." aria-label="Pesquisar">
            <nav class="top-nav" aria-label="Menu principal">
                <a href="#">Meus Pedidos</a>
                <a href="#">Promoções</a>
                <button type="button" class="login-btn">Entre ou Cadastre-se</button>
            </nav>
        </div>
        <nav class="bottom-nav" aria-label="Categorias">
            <a href="#">Cardápio</a>
            <a href="#">Cafés</a>
            <a href="#">Cafeteiras</a>
            <a href="#">Acessórios</a>
            <a href="#">Bebidas & Gourmet</a>
            <a href="#">Cafés Especiais</a>
            <a href="#">Seu Dia a Dia mais Completo!</a>
            <a href="#">Comece como um Profissional</a>
            <a href="#">Saiba Mais</a>
        </nav>
    </header>

    <main role="main">
        <div class="grid-container">
            <h2 class="grid-title">Grid Cafezinho</h2>
            <section class="grid" aria-label="Grade de itens">
                <div class="item">Texto</div>
                <div class="item">Texto</div>
                <div class="item">Texto</div>
                <div class="item">Texto</div>
                <div class="card">Item 1</div>
                <div class="card">Item 2</div>
                <div class="card">Item 3</div>
                <div class="banner">Anúncio</div>
                <div class="card">Item 4</div>
                <div class="card">Item 5</div>
                <div class="card">Item 6</div>
            </section>
        </div>
    </main>
</body>

</html>
