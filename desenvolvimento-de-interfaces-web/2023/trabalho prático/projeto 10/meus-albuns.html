    <main id="conteudo-meus-albuns" class="main-meus-albuns">

    <button type="button" id="btnOffline" class="btn-offline" title="Alternar modo offline" aria-label="Modo offline">
        <span class="btn-offline__icon" aria-hidden="true"></span>
        <span class="btn-offline__label">Offline</span>
    </button>

    <script src="offline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="meus-albuns.js"></script>
    <script>
        (function () {
            var btn = document.getElementById("btnOffline");
            function updateLabel() {
                if (!btn) return;
                var off = window.PortalOffline && window.PortalOffline.isOfflineMode();
                btn.classList.toggle("btn-offline--active", off);
                btn.querySelector(".btn-offline__label").textContent = off ? "Online" : "Offline";
            }
            if (btn) {
                btn.addEventListener("click", function () {
                    if (window.PortalOffline) { window.PortalOffline.toggleOfflineMode(); window.location.reload(); }
                });
                if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", updateLabel);
                else updateLabel();
            }
        })();
    </script>
